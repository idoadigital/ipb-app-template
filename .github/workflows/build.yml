name: "Build Mobile Apps"

on:
  workflow_dispatch:
    inputs:
      APP_NAME:
        description: "Display name of the app"
        required: true
      IOS_BUNDLE_ID:
        description: "iOS Bundle Identifier"
        required: true
      ANDROID_PACKAGE_NAME:
        description: "Android package name"
        required: true
      START_URL:
        description: "Web URL to wrap"
        required: true
      ALLOWED_DOMAINS:
        description: "Comma-separated allowed domains"
        required: false
        default: ""
      NAVIGATION_MODE:
        description: "allowlist_only or open_nav"
        required: false
        default: "allowlist_only"
      OPEN_EXTERNAL_IN_BROWSER:
        description: "Open external links in system browser"
        required: false
        default: "true"
      OFFLINE_FALLBACK:
        description: "Enable offline fallback page"
        required: false
        default: "true"
      STATUS_BAR_STYLE:
        description: "default, light, or dark"
        required: false
        default: "default"
      PRIMARY_COLOR:
        description: "Primary brand color hex"
        required: false
        default: "#0061FF"
      APP_VERSION:
        description: "Semantic version string"
        required: true
      IOS_BUILD_NUMBER:
        description: "iOS build number"
        required: true
      ANDROID_VERSION_CODE:
        description: "Android version code"
        required: true
      ICON_ASSET_URL:
        description: "URL to download app icon from"
        required: false
        default: ""
      SPLASH_ASSET_URL:
        description: "URL to download splash screen from"
        required: false
        default: ""
      RELEASE_TARGET:
        description: "none, testflight, play_internal, play_closed, play_production"
        required: false
        default: "none"
      PROJECT_ID:
        description: "IPB project UUID"
        required: true
      BUILD_JOB_ID:
        description: "IPB build job UUID"
        required: true

env:
  CI_CALLBACK_URL: ${{ secrets.CI_CALLBACK_URL }}
  IPB_CI_SECRET: ${{ secrets.IPB_CI_SECRET }}

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sharp build dependencies (libvips)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libvips-dev

      - name: Configure npm network resilience
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 300000

      - name: Install dependencies
        run: npm ci

      - name: Generate capacitor.config.ts
        env:
          APP_NAME: ${{ inputs.APP_NAME }}
          IOS_BUNDLE_ID: ${{ inputs.IOS_BUNDLE_ID }}
          ANDROID_PACKAGE_NAME: ${{ inputs.ANDROID_PACKAGE_NAME }}
          START_URL: ${{ inputs.START_URL }}
          ALLOWED_DOMAINS: ${{ inputs.ALLOWED_DOMAINS }}
          NAVIGATION_MODE: ${{ inputs.NAVIGATION_MODE }}
          OPEN_EXTERNAL_IN_BROWSER: ${{ inputs.OPEN_EXTERNAL_IN_BROWSER }}
          OFFLINE_FALLBACK: ${{ inputs.OFFLINE_FALLBACK }}
          STATUS_BAR_STYLE: ${{ inputs.STATUS_BAR_STYLE }}
          PRIMARY_COLOR: ${{ inputs.PRIMARY_COLOR }}
          APP_VERSION: ${{ inputs.APP_VERSION }}
          IOS_BUILD_NUMBER: ${{ inputs.IOS_BUILD_NUMBER }}
          ANDROID_VERSION_CODE: ${{ inputs.ANDROID_VERSION_CODE }}
        run: |
          if [ -f capacitor.config.ts ]; then
            echo "capacitor.config.ts already exists (committed by orchestrator), skipping generation"
            rm -f capacitor.config.ts.template
          else
            node scripts/generate-config.js
          fi
          rm -f capacitor.config.json

      - name: Download icon asset
        if: ${{ inputs.ICON_ASSET_URL != '' }}
        run: |
          mkdir -p assets
          curl -fSL --retry 3 --retry-delay 5 -o assets/icon.png "${{ inputs.ICON_ASSET_URL }}"
          FILE_SIZE=$(stat -c%s "assets/icon.png" 2>/dev/null || stat -f%z "assets/icon.png" 2>/dev/null || echo "0")
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "::error::Downloaded icon is too small (${FILE_SIZE} bytes) -- URL may be expired or invalid."
            exit 1
          fi

      - name: Download splash asset
        if: ${{ inputs.SPLASH_ASSET_URL != '' }}
        run: |
          mkdir -p assets
          curl -fSL --retry 3 --retry-delay 5 -o assets/splash.png "${{ inputs.SPLASH_ASSET_URL }}"
          FILE_SIZE=$(stat -c%s "assets/splash.png" 2>/dev/null || stat -f%z "assets/splash.png" 2>/dev/null || echo "0")
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "::error::Downloaded splash is too small (${FILE_SIZE} bytes) -- URL may be expired or invalid."
            exit 1
          fi

      - name: Generate icon and splash resources
        if: ${{ inputs.ICON_ASSET_URL != '' || inputs.SPLASH_ASSET_URL != '' }}
        run: npx @capacitor/assets generate --iconBackgroundColor "${{ inputs.PRIMARY_COLOR }}" --splashBackgroundColor "${{ inputs.PRIMARY_COLOR }}"

      - name: Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: |
            .
            !node_modules
          retention-days: 1

  build-android:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      artifact-id: ${{ steps.upload-aab.outputs.artifact-id || steps.upload-apk.outputs.artifact-id }}
      store-uploaded: ${{ steps.play-upload-status.outputs.uploaded }}
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add and sync Capacitor Android project
        run: |
          if [ -d android ] && [ ! -f android/app/build.gradle ]; then
            echo "Incomplete Android project detected, preserving Fastlane files..."
            cp -r android/fastlane /tmp/android-fastlane 2>/dev/null || true
            cp android/Gemfile /tmp/android-Gemfile 2>/dev/null || true
            rm -rf android
          fi
          if [ ! -f android/app/build.gradle ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping cap add."
          fi
          npx cap sync android
          cp -r /tmp/android-fastlane android/fastlane 2>/dev/null || true
          cp /tmp/android-Gemfile android/Gemfile 2>/dev/null || true

      - name: Set Android version
        working-directory: android
        run: |
          GRADLE_FILE="app/build.gradle"
          if [ -f app/build.gradle.kts ]; then
            GRADLE_FILE="app/build.gradle.kts"
          fi
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ inputs.APP_VERSION }}\"/" "$GRADLE_FILE"
          sed -i "s/versionCode [0-9]*/versionCode ${{ inputs.ANDROID_VERSION_CODE }}/" "$GRADLE_FILE"
          if ! grep -q "${{ inputs.APP_VERSION }}" "$GRADLE_FILE"; then
            echo "::warning::versionName substitution may not have applied in $GRADLE_FILE"
          fi
          if ! grep -q "versionCode ${{ inputs.ANDROID_VERSION_CODE }}" "$GRADLE_FILE" && ! grep -q "versionCode = ${{ inputs.ANDROID_VERSION_CODE }}" "$GRADLE_FILE"; then
            echo "::warning::versionCode substitution may not have applied in $GRADLE_FILE"
          fi
          echo "--- Version info ---"
          grep -E "version(Name|Code)" "$GRADLE_FILE" || true

      - name: Android Preflight Check
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "==========================================="
          echo "  ANDROID PREFLIGHT CHECK"
          echo "==========================================="
          PASS=0
          FAIL=0

          check() {
            local label="$1"
            local ok="$2"
            if [ "$ok" = "true" ]; then
              echo "  OK $label"
              PASS=$((PASS + 1))
            else
              echo "  FAIL $label"
              FAIL=$((FAIL + 1))
            fi
          }

          # Signing secrets
          [ -n "$ANDROID_KEYSTORE_BASE64" ] && check "ANDROID_KEYSTORE_BASE64 (${#ANDROID_KEYSTORE_BASE64} chars)" "true" || check "ANDROID_KEYSTORE_BASE64" "false"
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && check "ANDROID_KEYSTORE_PASSWORD" "true" || check "ANDROID_KEYSTORE_PASSWORD" "false"
          [ -n "$ANDROID_KEY_ALIAS" ] && check "ANDROID_KEY_ALIAS ($ANDROID_KEY_ALIAS)" "true" || check "ANDROID_KEY_ALIAS" "false"
          [ -n "$ANDROID_KEY_PASSWORD" ] && check "ANDROID_KEY_PASSWORD" "true" || check "ANDROID_KEY_PASSWORD" "false"

          # Play Store credentials
          [ -n "$GOOGLE_PLAY_JSON_KEY" ] && check "GOOGLE_PLAY_JSON_KEY (${#GOOGLE_PLAY_JSON_KEY} chars)" "true" || check "GOOGLE_PLAY_JSON_KEY (optional for store upload)" "false"

          # Files
          [ -f android/Gemfile ] && check "android/Gemfile" "true" || check "android/Gemfile" "false"
          [ -f android/fastlane/Fastfile ] && check "android/fastlane/Fastfile" "true" || check "android/fastlane/Fastfile" "false"
          [ -f android/fastlane/Appfile ] && check "android/fastlane/Appfile" "true" || check "android/fastlane/Appfile" "false"

          echo "==========================================="
          echo "  Result: $PASS passed, $FAIL failed"
          echo "==========================================="

          # Only fail if keystore is missing (signing secrets are critical)
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::No Android keystore configured -- building unsigned APK"
          fi

      - name: Decode Android keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Build signed AAB
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -Pandroid.injected.signing.store.file=$RUNNER_TEMP/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build unsigned APK
        if: env.HAS_KEYSTORE != 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload AAB artifact
        if: env.HAS_KEYSTORE == 'true'
        id: upload-aab
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK artifact
        if: env.HAS_KEYSTORE != 'true'
        id: upload-apk
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Verify Android Gemfile
        if: ${{ contains(fromJSON('["play_internal", "play_closed", "play_production"]'), inputs.RELEASE_TARGET) && env.HAS_KEYSTORE == 'true' }}
        working-directory: android
        run: |
          if [ ! -f Gemfile ]; then
            echo "::warning::Android Gemfile missing -- generating default"
            echo 'c291cmNlICJodHRwczovL3J1YnlnZW1zLm9yZyIKCmdlbSAiZmFzdGxhbmUiLCAifj4gMi4yMjUiCmdlbSAiY29sb3JlZDIiLCAifj4gMy4xIgo=' | base64 --decode > Gemfile
          fi
          echo "Android Gemfile verified successfully"

      - name: Set up Ruby
        if: ${{ contains(fromJSON('["play_internal", "play_closed", "play_production"]'), inputs.RELEASE_TARGET) && env.HAS_KEYSTORE == 'true' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true
          working-directory: android

      - name: Verify Android gems
        if: ${{ contains(fromJSON('["play_internal", "play_closed", "play_production"]'), inputs.RELEASE_TARGET) && env.HAS_KEYSTORE == 'true' }}
        working-directory: android
        run: |
          bundle check
          bundle exec ruby -e "require 'rubygems'; puts \"colored2=#{Gem::Specification.find_by_name('colored2').version}\""
          bundle exec fastlane --version

      - name: Verify Android Fastfile exists
        if: ${{ contains(fromJSON('["play_internal", "play_closed", "play_production"]'), inputs.RELEASE_TARGET) && env.HAS_KEYSTORE == 'true' }}
        working-directory: android
        run: |
          if [ ! -f fastlane/Fastfile ]; then
            echo "::error::Android fastlane/Fastfile is missing. It should be synced from the template repo."
            exit 1
          fi
          if ! grep -q "lane :upload_aab_to_play_store" fastlane/Fastfile; then
            echo "::error::Expected lane upload_aab_to_play_store not found in Android Fastfile"
            exit 1
          fi
          echo "Android Fastfile verified successfully"

      - name: Upload to Play Store
        id: play-upload
        if: ${{ contains(fromJSON('["play_internal", "play_closed", "play_production"]'), inputs.RELEASE_TARGET) && env.HAS_KEYSTORE == 'true' }}
        working-directory: android
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          ANDROID_PACKAGE_NAME: ${{ inputs.ANDROID_PACKAGE_NAME }}
        run: |
          TRACK="internal"
          if [[ "${{ inputs.RELEASE_TARGET }}" == "play_closed" ]]; then TRACK="alpha"; fi
          if [[ "${{ inputs.RELEASE_TARGET }}" == "play_production" ]]; then TRACK="production"; fi
          export BUNDLE_GEMFILE="$PWD/Gemfile"
          export BUNDLE_PATH="$PWD/vendor/bundle"
          bundle exec fastlane android upload_aab_to_play_store track:$TRACK

      - name: Set Play Store upload status
        id: play-upload-status
        if: always()
        run: |
          if [[ "${{ steps.play-upload.outcome }}" == "success" ]]; then
            echo "uploaded=true" >> $GITHUB_OUTPUT
          else
            echo "uploaded=false" >> $GITHUB_OUTPUT
          fi

  build-ios:
    needs: setup
    runs-on: macos-15
    timeout-minutes: 45
    outputs:
      artifact-id: ${{ steps.upload-ipa.outputs.artifact-id || steps.upload-xcarchive.outputs.artifact-id }}
      store-uploaded: ${{ steps.testflight-upload-status.outputs.uploaded }}
    env:
      HAS_IOS_SIGNING: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' }}
    steps:
      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Add and sync Capacitor iOS project
        run: |
          if [ -d ios ] && [ ! -f ios/App/Podfile ]; then
            echo "Incomplete iOS project detected, preserving Fastlane files..."
            cp -r ios/fastlane /tmp/ios-fastlane 2>/dev/null || true
            cp ios/Gemfile /tmp/ios-Gemfile 2>/dev/null || true
            rm -rf ios
          fi
          if [ ! -f ios/App/Podfile ]; then
            npx cap add ios
          else
            echo "iOS platform already exists, skipping cap add."
          fi
          npx cap sync ios
          cp -r /tmp/ios-fastlane ios/fastlane 2>/dev/null || true
          cp /tmp/ios-Gemfile ios/Gemfile 2>/dev/null || true

      - name: Ensure iOS Fastfile exists
        run: |
          mkdir -p ios/fastlane
          if [ ! -f ios/fastlane/Fastfile ]; then
            echo "::warning::iOS Fastfile missing — creating inline fallback"
            echo '' | base64 --decode > ios/fastlane/Fastfile
          fi
          if [ ! -f ios/fastlane/Appfile ]; then
            echo "app_identifier(ENV[\"IOS_BUNDLE_ID\"])" > ios/fastlane/Appfile
          fi
          echo "iOS Fastfile verified successfully"
      - name: Ensure iOS Gemfile exists
        run: |
          if [ ! -f ios/Gemfile ]; then
            echo "::warning::iOS Gemfile missing — creating inline fallback"
            echo 'c291cmNlICJodHRwczovL3J1YnlnZW1zLm9yZyIKCmdlbSAiZmFzdGxhbmUiLCAifj4gMi4yMjUiCmdlbSAiY29jb2Fwb2RzIiwgIn4+IDEuMTYiCmdlbSAiY29sb3JlZDIiLCAifj4gMy4xIgo=' | base64 --decode > ios/Gemfile
          fi
          echo "iOS Gemfile verified successfully"
      - name: iOS Preflight Check
        if: env.HAS_IOS_SIGNING == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "==========================================="
          echo "  iOS PREFLIGHT CHECK"
          echo "==========================================="
          PASS=0
          FAIL=0

          check() {
            local label="$1"
            local ok="$2"
            if [ "$ok" = "true" ]; then
              echo "  OK $label"
              PASS=$((PASS + 1))
            else
              echo "  FAIL $label"
              FAIL=$((FAIL + 1))
            fi
          }

          # Secrets
          [ -n "$ASC_KEY_ID" ] && check "ASC_KEY_ID" "true" || check "ASC_KEY_ID" "false"
          [ -n "$ASC_ISSUER_ID" ] && check "ASC_ISSUER_ID" "true" || check "ASC_ISSUER_ID" "false"
          [ -n "$ASC_KEY_CONTENT" ] && check "ASC_KEY_CONTENT (${#ASC_KEY_CONTENT} chars)" "true" || check "ASC_KEY_CONTENT" "false"
          [ -n "$APPLE_TEAM_ID" ] && check "APPLE_TEAM_ID ($APPLE_TEAM_ID)" "true" || check "APPLE_TEAM_ID" "false"

          # Files
          [ -f ios/fastlane/Fastfile ] && check "ios/fastlane/Fastfile" "true" || check "ios/fastlane/Fastfile" "false"
          [ -f ios/Gemfile ] && check "ios/Gemfile" "true" || check "ios/Gemfile" "false"
          [ -f ios/fastlane/Appfile ] && check "ios/fastlane/Appfile" "true" || check "ios/fastlane/Appfile" "false"

          echo "==========================================="
          echo "  Result: $PASS passed, $FAIL failed"
          echo "==========================================="

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::iOS preflight failed -- $FAIL required item(s) missing. Check the list above."
            exit 1
          fi

      - name: Set iOS version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.APP_VERSION }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ inputs.IOS_BUILD_NUMBER }}" App/Info.plist

      - name: Install Apple certificate
        if: env.HAS_IOS_SIGNING == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

          echo "Certificate imported successfully"
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Create App Store Connect API key file
        if: env.HAS_IOS_SIGNING == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          KEY_DIR="$HOME/private_keys"
          KEY_FILE="$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          mkdir -p "$KEY_DIR"

          printf '%s' "$ASC_KEY_CONTENT" | base64 --decode > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_FILE"; then
            echo "::error::Invalid .p8 key — missing PEM header"
            head -1 "$KEY_FILE" | cat -v
            exit 1
          fi
          echo "ASC key validated: $(wc -c < "$KEY_FILE") bytes"

      - name: Build iOS archive (signed)
        if: env.HAS_IOS_SIGNING == 'true'
        working-directory: ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEY_PATH="$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          if [ ! -r "$KEY_PATH" ]; then
            echo "::error::Auth key not found/readable at $KEY_PATH"
            ls -la "$HOME/private_keys" || true
            exit 1
          fi
          echo "Using auth key at: $KEY_PATH"
          ls -la "$KEY_PATH"

          # Patch DEVELOPMENT_TEAM into the Xcode project if APPLE_TEAM_ID is set
          if [ -n "$APPLE_TEAM_ID" ]; then
            echo "Setting DEVELOPMENT_TEAM to $APPLE_TEAM_ID in project.pbxproj"
            sed -i '' "s/DEVELOPMENT_TEAM = \"\"/DEVELOPMENT_TEAM = \"${APPLE_TEAM_ID}\"/g" App.xcodeproj/project.pbxproj 2>/dev/null || true
            sed -i '' "s/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = ${APPLE_TEAM_ID};/g" App.xcodeproj/project.pbxproj 2>/dev/null || true
          fi

          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -allowProvisioningUpdates

      - name: Build iOS archive (unsigned)
        if: env.HAS_IOS_SIGNING != 'true'
        working-directory: ios/App
        run: |
          echo "::notice::Building unsigned archive (no signing certs configured)"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' App.xcodeproj/project.pbxproj 2>/dev/null || true
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Distribution"/CODE_SIGN_IDENTITY = ""/g' App.xcodeproj/project.pbxproj 2>/dev/null || true
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' App.xcodeproj/project.pbxproj 2>/dev/null || true
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM=""

      - name: Export IPA
        if: env.HAS_IOS_SIGNING == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          echo '' | base64 --decode > $RUNNER_TEMP/ExportOptions.plist

          KEY_PATH="$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -allowProvisioningUpdates

          mkdir -p ios/build
          cp $RUNNER_TEMP/export/*.ipa ios/build/app.ipa
          echo "IPA exported successfully:"
          ls -la ios/build/

      - name: Upload IPA artifact
        if: env.HAS_IOS_SIGNING == 'true'
        id: upload-ipa
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ios/build/app.ipa
          retention-days: 30

      - name: Upload xcarchive artifact (unsigned)
        if: env.HAS_IOS_SIGNING != 'true'
        id: upload-xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ${{ runner.temp }}/App.xcarchive
          retention-days: 30

      - name: Set up Ruby
        if: ${{ inputs.RELEASE_TARGET == 'testflight' && env.HAS_IOS_SIGNING == 'true' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true
          working-directory: ios

        - name: Verify iOS gems
          if: ${{ inputs.RELEASE_TARGET == 'testflight' && env.HAS_IOS_SIGNING == 'true' }}
          working-directory: ios
          run: |
            bundle check
            bundle exec ruby -e "require 'rubygems'; puts \"colored2=#{Gem::Specification.find_by_name('colored2').version}\""
            bundle exec fastlane --version

      - name: Upload to TestFlight
        id: testflight-upload
        if: ${{ inputs.RELEASE_TARGET == 'testflight' && env.HAS_IOS_SIGNING == 'true' }}
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          IOS_BUNDLE_ID: ${{ inputs.IOS_BUNDLE_ID }}
          APP_NAME: ${{ inputs.APP_NAME }}
        run: |
          BUNDLER_VERSION=2.5.22
          bundle _${BUNDLER_VERSION}_ exec fastlane ios upload_to_testflight_lane

      - name: Set TestFlight upload status
        id: testflight-upload-status
        if: always()
        run: |
          if [[ "${{ steps.testflight-upload.outcome }}" == "success" ]]; then
            echo "uploaded=true" >> $GITHUB_OUTPUT
          else
            echo "uploaded=false" >> $GITHUB_OUTPUT
          fi

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  notify:
    needs: [build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine build status
        id: status
        run: |
          ANDROID_RESULT="${{ needs.build-android.result }}"
          IOS_RESULT="${{ needs.build-ios.result }}"

          if [[ "$ANDROID_RESULT" == "success" && "$IOS_RESULT" == "success" ]]; then
            echo "result=succeeded" >> $GITHUB_OUTPUT
            echo "error_message=" >> $GITHUB_OUTPUT
          elif [[ "$ANDROID_RESULT" == "skipped" && "$IOS_RESULT" == "success" ]]; then
            echo "result=succeeded" >> $GITHUB_OUTPUT
            echo "error_message=" >> $GITHUB_OUTPUT
          elif [[ "$ANDROID_RESULT" == "success" && "$IOS_RESULT" == "skipped" ]]; then
            echo "result=succeeded" >> $GITHUB_OUTPUT
            echo "error_message=" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
            ERRORS=""
            if [[ "$ANDROID_RESULT" == "failure" ]]; then
              ERRORS="Android build failed."
            fi
            if [[ "$IOS_RESULT" == "failure" ]]; then
              if [[ -n "$ERRORS" ]]; then ERRORS="$ERRORS "; fi
              ERRORS="${ERRORS}iOS build failed."
            fi
            if [[ "$ANDROID_RESULT" == "cancelled" || "$IOS_RESULT" == "cancelled" ]]; then
              if [[ -n "$ERRORS" ]]; then ERRORS="$ERRORS "; fi
              ERRORS="${ERRORS}Build was cancelled."
            fi
            if [[ -z "$ERRORS" ]]; then
              ERRORS="Build failed. Check workflow logs for details."
            fi
            echo "error_message=${ERRORS}" >> $GITHUB_OUTPUT
          fi

      - name: Determine release status
        id: release
        run: |
          RELEASE_TARGET="${{ inputs.RELEASE_TARGET }}"
          ANDROID_UPLOADED="${{ needs.build-android.outputs.store-uploaded }}"
          IOS_UPLOADED="${{ needs.build-ios.outputs.store-uploaded }}"

          if [[ "$RELEASE_TARGET" == "none" || -z "$RELEASE_TARGET" ]]; then
            echo "status=not_requested" >> $GITHUB_OUTPUT
            echo "track=" >> $GITHUB_OUTPUT
          elif [[ "$ANDROID_UPLOADED" == "true" || "$IOS_UPLOADED" == "true" ]]; then
            echo "status=uploaded_to_store" >> $GITHUB_OUTPUT
            echo "track=$RELEASE_TARGET" >> $GITHUB_OUTPUT
          else
            echo "status=upload_skipped" >> $GITHUB_OUTPUT
            echo "track=$RELEASE_TARGET" >> $GITHUB_OUTPUT
          fi

      - name: Notify CI callback
        run: |
          RAW_CALLBACK_URL="${CI_CALLBACK_URL}"
          CALLBACK_URL="$(printf '%s' "$RAW_CALLBACK_URL" | tr -d '\r' | xargs)"

          if [[ -z "$CALLBACK_URL" ]]; then
            echo "::error::CI_CALLBACK_URL secret is empty."
            echo "Please ensure worker preflight can inject CI_CALLBACK_URL and IPB_CI_SECRET before dispatch."
            exit 1
          fi

          if [[ ! "$CALLBACK_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "::error::CI_CALLBACK_URL is malformed: '$CALLBACK_URL'"
            echo "Expected format: https://<your-backend-domain>/functions/v1/ci-callback"
            exit 1
          fi

          if [[ -z "${IPB_CI_SECRET}" ]]; then
            echo "::error::IPB_CI_SECRET secret is empty."
            exit 1
          fi

          ANDROID_ARTIFACT_ID="${{ needs.build-android.outputs.artifact-id }}"
          IOS_ARTIFACT_ID="${{ needs.build-ios.outputs.artifact-id }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          ANDROID_URL=""
          if [[ -n "$ANDROID_ARTIFACT_ID" ]]; then
            ANDROID_URL="${REPO_URL}/actions/runs/${{ github.run_id }}/artifacts/${ANDROID_ARTIFACT_ID}"
          fi

          IOS_URL=""
          if [[ -n "$IOS_ARTIFACT_ID" ]]; then
            IOS_URL="${REPO_URL}/actions/runs/${{ github.run_id }}/artifacts/${IOS_ARTIFACT_ID}"
          fi

          PAYLOAD=$(jq -n \
            --arg build_id "${{ inputs.BUILD_JOB_ID }}" \
            --arg status "${{ steps.status.outputs.result }}" \
            --arg error_message "${{ steps.status.outputs.error_message }}" \
            --arg artifact_android_url "$ANDROID_URL" \
            --arg artifact_ios_url "$IOS_URL" \
            --arg workflow_run_url "${REPO_URL}/actions/runs/${{ github.run_id }}" \
            --arg release_status "${{ steps.release.outputs.status }}" \
            --arg released_to_track "${{ steps.release.outputs.track }}" \
            '{
              build_id: $build_id,
              status: $status,
              error_message: $error_message,
              artifact_android_url: $artifact_android_url,
              artifact_ios_url: $artifact_ios_url,
              workflow_run_url: $workflow_run_url,
              logs_url: $workflow_run_url,
              release_status: $release_status,
              released_to_track: $released_to_track
            }')

          echo "Sending callback to CI..."
          curl -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "x-ipb-ci-secret: ${IPB_CI_SECRET}" \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --fail-with-body \
            --max-time 30 \
            -d "$PAYLOAD"
          echo ""
          echo "Callback sent successfully."
