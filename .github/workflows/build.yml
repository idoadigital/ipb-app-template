name: Build Mobile Apps

on:
  workflow_dispatch:
    inputs:
      APP_NAME:
        description: 'Display name of the app'
        required: true
      IOS_BUNDLE_ID:
        description: 'iOS Bundle Identifier'
        required: true
      ANDROID_PACKAGE_NAME:
        description: 'Android package name'
        required: true
      START_URL:
        description: 'Web URL to wrap'
        required: true
      ALLOWED_DOMAINS:
        description: 'Comma-separated allowed domains'
        required: false
        default: ''
      NAVIGATION_MODE:
        description: 'allowlist_only or open_nav'
        required: false
        default: 'allowlist_only'
      OPEN_EXTERNAL_IN_BROWSER:
        description: 'Open external links in system browser'
        required: false
        default: 'true'
      OFFLINE_FALLBACK:
        description: 'Enable offline fallback page'
        required: false
        default: 'true'
      STATUS_BAR_STYLE:
        description: 'default, light, or dark'
        required: false
        default: 'default'
      PRIMARY_COLOR:
        description: 'Primary brand color hex'
        required: false
        default: '#0061FF'
      APP_VERSION:
        description: 'Semantic version string'
        required: true
      IOS_BUILD_NUMBER:
        description: 'iOS build number'
        required: true
      ANDROID_VERSION_CODE:
        description: 'Android version code'
        required: true
      ICON_ASSET_URL:
        description: 'URL to download app icon from'
        required: false
      SPLASH_ASSET_URL:
        description: 'URL to download splash screen from'
        required: false
      RELEASE_TARGET:
        description: 'none, testflight, play_internal, play_closed, play_production'
        required: false
        default: 'none'
      PROJECT_ID:
        description: 'IPB project UUID'
        required: true
      BUILD_JOB_ID:
        description: 'IPB build job UUID'
        required: true

env:
  CI_CALLBACK_URL: ${{ secrets.CI_CALLBACK_URL }}
  IPB_CI_SECRET: ${{ secrets.IPB_CI_SECRET }}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate capacitor.config.ts
        env:
          APP_NAME: ${{ inputs.APP_NAME }}
          IOS_BUNDLE_ID: ${{ inputs.IOS_BUNDLE_ID }}
          ANDROID_PACKAGE_NAME: ${{ inputs.ANDROID_PACKAGE_NAME }}
          START_URL: ${{ inputs.START_URL }}
          ALLOWED_DOMAINS: ${{ inputs.ALLOWED_DOMAINS }}
          NAVIGATION_MODE: ${{ inputs.NAVIGATION_MODE }}
          OPEN_EXTERNAL_IN_BROWSER: ${{ inputs.OPEN_EXTERNAL_IN_BROWSER }}
          OFFLINE_FALLBACK: ${{ inputs.OFFLINE_FALLBACK }}
          STATUS_BAR_STYLE: ${{ inputs.STATUS_BAR_STYLE }}
          PRIMARY_COLOR: ${{ inputs.PRIMARY_COLOR }}
          APP_VERSION: ${{ inputs.APP_VERSION }}
          IOS_BUILD_NUMBER: ${{ inputs.IOS_BUILD_NUMBER }}
          ANDROID_VERSION_CODE: ${{ inputs.ANDROID_VERSION_CODE }}
        run: node scripts/generate-config.js

      - name: Download icon asset
        if: ${{ inputs.ICON_ASSET_URL != '' }}
        run: |
          mkdir -p assets
          curl -fSL -o assets/icon.png "${{ inputs.ICON_ASSET_URL }}"

      - name: Download splash asset
        if: ${{ inputs.SPLASH_ASSET_URL != '' }}
        run: |
          mkdir -p assets
          curl -fSL -o assets/splash.png "${{ inputs.SPLASH_ASSET_URL }}"

      - name: Generate icon and splash resources
        if: ${{ inputs.ICON_ASSET_URL != '' || inputs.SPLASH_ASSET_URL != '' }}
        run: npx @capacitor/assets generate --iconBackgroundColor '${{ inputs.PRIMARY_COLOR }}' --splashBackgroundColor '${{ inputs.PRIMARY_COLOR }}'

      - name: Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: |
            .
            !node_modules
          retention-days: 1

  build-android:
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      artifact-url: ${{ steps.upload-apk.outputs.artifact-url }}
    steps:
      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add and sync Capacitor Android project
        run: |
          # Preserve Fastlane files, remove skeleton so cap add can create full project
          if [ -d android ] && [ ! -f android/app/build.gradle ]; then
            cp -r android/fastlane /tmp/android-fastlane 2>/dev/null || true
            cp android/Gemfile /tmp/android-Gemfile 2>/dev/null || true
            rm -rf android
          fi
          npx cap add android || true
          npx cap sync android
          # Restore Fastlane files
          cp -r /tmp/android-fastlane android/fastlane 2>/dev/null || true
          cp /tmp/android-Gemfile android/Gemfile 2>/dev/null || true

      - name: Set Android version
        working-directory: android
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ inputs.APP_VERSION }}\"/" app/build.gradle
          sed -i "s/versionCode .*/versionCode ${{ inputs.ANDROID_VERSION_CODE }}/" app/build.gradle

      - name: Build Android release
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        id: upload-apk
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Install Ruby and Fastlane
        if: ${{ contains(fromJSON('["play_internal", "play_closed", "play_production"]'), inputs.RELEASE_TARGET) }}
        working-directory: android
        run: |
          gem install bundler
          bundle install

      - name: Upload to Play Store
        if: ${{ contains(fromJSON('["play_internal", "play_closed", "play_production"]'), inputs.RELEASE_TARGET) }}
        working-directory: android
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          ANDROID_PACKAGE_NAME: ${{ inputs.ANDROID_PACKAGE_NAME }}
        run: |
          TRACK="internal"
          if [[ "${{ inputs.RELEASE_TARGET }}" == "play_closed" ]]; then TRACK="alpha"; fi
          if [[ "${{ inputs.RELEASE_TARGET }}" == "play_production" ]]; then TRACK="production"; fi
          bundle exec fastlane upload_to_play_store track:$TRACK

  build-ios:
    needs: setup
    runs-on: macos-14
    outputs:
      artifact-url: ${{ steps.upload-ipa.outputs.artifact-url }}
    steps:
      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Select Xcode version
        run: |
          # Use latest available Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
            echo "Selected Xcode: $XCODE_PATH"
          fi
          xcodebuild -version

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Add and sync Capacitor iOS project
        run: |
          # Preserve Fastlane files, remove skeleton so cap add can create full project
          if [ -d ios ] && [ ! -f ios/App/Podfile ]; then
            cp -r ios/fastlane /tmp/ios-fastlane 2>/dev/null || true
            cp ios/Gemfile /tmp/ios-Gemfile 2>/dev/null || true
            rm -rf ios
          fi
          npx cap add ios || true
          npx cap sync ios
          # Restore Fastlane files
          cp -r /tmp/ios-fastlane ios/fastlane 2>/dev/null || true
          cp /tmp/ios-Gemfile ios/Gemfile 2>/dev/null || true

      - name: Set iOS version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.APP_VERSION }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ inputs.IOS_BUILD_NUMBER }}" App/Info.plist

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload IPA artifact
        id: upload-ipa
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Install Ruby and Fastlane
        if: ${{ inputs.RELEASE_TARGET == 'testflight' }}
        run: |
          gem install bundler
          cd ios && bundle install

      - name: Upload to TestFlight
        if: ${{ inputs.RELEASE_TARGET == 'testflight' }}
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          IOS_BUNDLE_ID: ${{ inputs.IOS_BUNDLE_ID }}
          APP_NAME: ${{ inputs.APP_NAME }}
        run: bundle exec fastlane upload_to_testflight_lane

  notify:
    needs: [build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine build status
        id: status
        run: |
          ANDROID_RESULT="${{ needs.build-android.result }}"
          IOS_RESULT="${{ needs.build-ios.result }}"

          if [[ "$ANDROID_RESULT" == "success" && "$IOS_RESULT" == "success" ]]; then
            echo "result=succeeded" >> $GITHUB_OUTPUT
            echo "error_message=" >> $GITHUB_OUTPUT
          elif [[ "$ANDROID_RESULT" == "skipped" && "$IOS_RESULT" == "success" ]]; then
            echo "result=succeeded" >> $GITHUB_OUTPUT
            echo "error_message=" >> $GITHUB_OUTPUT
          elif [[ "$ANDROID_RESULT" == "success" && "$IOS_RESULT" == "skipped" ]]; then
            echo "result=succeeded" >> $GITHUB_OUTPUT
            echo "error_message=" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
            # Build error message from failed jobs
            ERRORS=""
            if [[ "$ANDROID_RESULT" == "failure" ]]; then
              ERRORS="Android build failed."
            fi
            if [[ "$IOS_RESULT" == "failure" ]]; then
              if [[ -n "$ERRORS" ]]; then ERRORS="$ERRORS "; fi
              ERRORS="${ERRORS}iOS build failed."
            fi
            if [[ "$ANDROID_RESULT" == "cancelled" || "$IOS_RESULT" == "cancelled" ]]; then
              if [[ -n "$ERRORS" ]]; then ERRORS="$ERRORS "; fi
              ERRORS="${ERRORS}Build was cancelled."
            fi
            if [[ -z "$ERRORS" ]]; then
              ERRORS="Build failed. Check workflow logs for details."
            fi
            echo "error_message=${ERRORS}" >> $GITHUB_OUTPUT
          fi

      - name: Notify CI callback
        run: |
          # Build JSON payload with jq to safely handle special characters
          PAYLOAD=$(jq -n \
            --arg build_id "${{ inputs.BUILD_JOB_ID }}" \
            --arg status "${{ steps.status.outputs.result }}" \
            --arg error_message "${{ steps.status.outputs.error_message }}" \
            --arg artifact_android_url "${{ needs.build-android.outputs.artifact-url }}" \
            --arg artifact_ios_url "${{ needs.build-ios.outputs.artifact-url }}" \
            --arg workflow_run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              build_id: $build_id,
              status: $status,
              error_message: $error_message,
              artifact_android_url: $artifact_android_url,
              artifact_ios_url: $artifact_ios_url,
              workflow_run_url: $workflow_run_url,
              logs_url: $workflow_run_url
            }')
          curl -X POST "${CI_CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-ipb-ci-secret: ${IPB_CI_SECRET}" \
            -d "$PAYLOAD"
